<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Tanzania Plots Company Limited — CRM</title>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --blue:#1a3c8f;--blue2:#0d2460;--blue3:#2654b8;--blue-lt:#dce8fb;--blue-xlt:#f0f5ff;
  --red:#cc1f1f;--red2:#a01515;--red-lt:#fde8e8;
  --navy:#0a1640;--white:#ffffff;--off:#f4f7ff;
  --border:#dde3f0;--muted:#6b7280;--ink:#1a1f36;
  --green:#15803d;--green-lt:#dcfce7;
  --amber:#d97706;--amber-lt:#fef3c7;
  --orange:#ea580c;--orange-lt:#ffedd5;
  --sidebar-w:272px;--radius:10px;
  --shadow:0 1px 4px rgba(26,60,143,.07),0 4px 18px rgba(26,60,143,.05);
  --shadow-lg:0 8px 32px rgba(26,60,143,.18);
}
body{font-family:'Open Sans',sans-serif;background:var(--off);color:var(--ink);line-height:1.6;min-height:100vh;font-size:16px}
h1,h2,h3,h4{font-family:'Montserrat',sans-serif;font-weight:700}
/* SIDEBAR */
.layout{display:flex;min-height:100vh}
.sidebar{
  width:var(--sidebar-w);background:linear-gradient(175deg,var(--navy) 0%,var(--blue2) 55%,var(--blue) 100%);
  display:flex;flex-direction:column;position:fixed;top:0;left:0;bottom:0;z-index:100;
  box-shadow:4px 0 24px rgba(10,22,64,.35);transition:transform .28s ease;
}
.sidebar.open{transform:translateX(0)!important}
.sb-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:99}
.sb-overlay.show{display:block}
.sb-brand{padding:22px 18px 18px;border-bottom:1px solid rgba(255,255,255,.09);
  display:flex;flex-direction:column;align-items:center;background:rgba(0,0,0,.15);}
.sb-logo{width:76px;height:76px;object-fit:contain;margin-bottom:10px;
  filter:drop-shadow(0 3px 10px rgba(0,0,0,.35));border-radius:4px;}
.sb-name{font-family:'Montserrat',sans-serif;font-weight:900;font-size:.75rem;
  color:#fff;text-align:center;letter-spacing:.6px;line-height:1.35;text-transform:uppercase;}
.sb-name em{color:#ff6b6b;font-style:normal}
.sb-motto{font-size:.62rem;color:rgba(255,255,255,.45);text-align:center;margin-top:4px;font-style:italic}
.sb-nav{flex:1;padding:10px 0;overflow-y:auto}
.sb-nav::-webkit-scrollbar{width:3px}
.sb-nav::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
.nav-section{padding:10px 18px 3px;font-size:.6rem;letter-spacing:1.8px;text-transform:uppercase;color:rgba(255,255,255,.3);font-weight:700}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 16px;
  border-radius:8px;margin:1px 8px;cursor:pointer;font-size:.84rem;
  color:rgba(255,255,255,.6);transition:all .18s;font-weight:500;position:relative;}
.nav-item:hover{background:rgba(255,255,255,.09);color:#fff}
.nav-item.active{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 3px 14px rgba(204,31,31,.45);}
.nav-item .ni{font-size:.95rem;width:20px;text-align:center;flex-shrink:0}
.nav-badge{margin-left:auto;background:var(--red);color:#fff;font-size:.63rem;padding:2px 7px;border-radius:20px;font-weight:800;animation:blink 2s infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.55}}
.sb-foot{padding:12px;border-top:1px solid rgba(255,255,255,.09)}
.user-pill{display:flex;align-items:center;gap:9px;padding:9px 11px;
  background:rgba(255,255,255,.07);border-radius:10px;border:1px solid rgba(255,255,255,.1)}
.av{width:33px;height:33px;border-radius:50%;display:flex;align-items:center;justify-content:center;
  font-weight:800;font-size:.78rem;flex-shrink:0;letter-spacing:.5px}
.av-red{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 2px 8px rgba(204,31,31,.4)}
.av-blue{background:linear-gradient(135deg,var(--blue3),var(--blue2));color:#fff;box-shadow:0 2px 8px rgba(26,60,143,.4)}
.u-name{font-size:.8rem;color:#fff;font-weight:700}
.u-role{font-size:.67rem;color:rgba(255,255,255,.45)}
.logout-btn{margin-left:auto;background:rgba(204,31,31,.18);border:1px solid rgba(204,31,31,.25);
  color:#fca5a5;padding:5px 9px;border-radius:6px;cursor:pointer;font-size:.73rem;transition:all .2s}
.logout-btn:hover{background:var(--red);color:#fff;border-color:var(--red)}
/* HAMBURGER */
.hamburger{display:none;background:none;border:none;cursor:pointer;padding:8px;color:var(--navy)}
.hamburger span{display:block;width:22px;height:2px;background:currentColor;margin:4px 0;transition:.2s}
/* MAIN */
.main{margin-left:var(--sidebar-w);flex:1;display:flex;flex-direction:column;min-height:100vh}
.topbar{background:var(--white);border-bottom:3px solid var(--blue);
  padding:0 28px;height:62px;display:flex;align-items:center;justify-content:space-between;
  position:sticky;top:0;z-index:50;box-shadow:0 2px 14px rgba(26,60,143,.09);}
.tb-left{display:flex;align-items:center;gap:10px}
.tb-logo{height:34px;width:34px;object-fit:contain}
.tb-title{font-size:1.08rem;font-weight:800;font-family:'Montserrat',sans-serif;color:var(--blue)}
.tb-sub{font-size:.68rem;color:var(--muted);margin-top:1px}
.page{padding:26px 30px;flex:1}
/* PAGE HEADER */
.ph{display:flex;align-items:flex-start;justify-content:space-between;margin-bottom:22px;flex-wrap:wrap;gap:12px}
.ph h1{font-size:1.35rem;color:var(--navy)}
.ph-bar{width:38px;height:3.5px;border-radius:2px;margin-top:5px;background:linear-gradient(90deg,var(--red),var(--blue))}
/* CARDS */
.card{background:#fff;border:1px solid var(--border);border-radius:var(--radius);box-shadow:var(--shadow)}
.card-hd{padding:14px 20px;border-bottom:1px solid var(--border);display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(135deg,#f6f9ff,#fff);border-radius:var(--radius) var(--radius) 0 0}
.card-title{font-size:.92rem;font-weight:700;font-family:'Montserrat',sans-serif;color:var(--navy)}
.card-body{padding:20px}
/* STATS */
.sg{display:grid;grid-template-columns:repeat(auto-fit,minmax(175px,1fr));gap:16px;margin-bottom:22px}
.sc{background:#fff;border-radius:var(--radius);padding:18px 20px;position:relative;overflow:hidden;
  box-shadow:var(--shadow);border:1px solid var(--border);transition:transform .2s,box-shadow .2s}
.sc:hover{transform:translateY(-2px);box-shadow:var(--shadow-lg)}
.sc::before{content:'';position:absolute;top:0;left:0;right:0;height:4px}
.sc.sb::before{background:linear-gradient(90deg,var(--blue),var(--blue3))}
.sc.sr::before{background:linear-gradient(90deg,var(--red),#f87171)}
.sc.sg2::before{background:linear-gradient(90deg,var(--green),#22c55e)}
.sc.sa::before{background:linear-gradient(90deg,var(--amber),#fbbf24)}
.sc.so::before{background:linear-gradient(90deg,var(--orange),#fb923c)}
.sc.sn::before{background:linear-gradient(90deg,var(--navy),var(--blue2))}
.sc-icon{position:absolute;top:14px;right:16px;font-size:1.7rem;opacity:.12}
.sc-lbl{font-size:.7rem;text-transform:uppercase;letter-spacing:.8px;color:var(--muted);font-weight:700;font-family:'Montserrat',sans-serif}
.sc-val{font-size:1.65rem;font-weight:900;font-family:'Montserrat',sans-serif;margin:4px 0;color:var(--navy)}
.sc-sub{font-size:.76rem;color:var(--muted)}
/* BUTTONS */
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 17px;border-radius:7px;border:none;
  cursor:pointer;font-family:'Open Sans',sans-serif;font-size:.84rem;font-weight:600;transition:all .18s;white-space:nowrap}
.btn-blue{background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff;box-shadow:0 2px 8px rgba(26,60,143,.28)}
.btn-blue:hover{background:linear-gradient(135deg,var(--blue2),var(--blue));box-shadow:0 4px 14px rgba(26,60,143,.38);transform:translateY(-1px)}
.btn-red{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;box-shadow:0 2px 8px rgba(204,31,31,.28)}
.btn-red:hover{background:linear-gradient(135deg,var(--red2),#800000);transform:translateY(-1px)}
.btn-outline{background:#fff;border:1.5px solid var(--border);color:var(--ink)}
.btn-outline:hover{border-color:var(--blue);color:var(--blue);background:var(--blue-xlt)}
.btn-success{background:linear-gradient(135deg,var(--green),#16a34a);color:#fff}
.btn-success:hover{background:linear-gradient(135deg,#166534,var(--green))}
.btn-danger{background:var(--red-lt);color:var(--red);border:1px solid #fca5a5}
.btn-danger:hover{background:var(--red);color:#fff}
.btn-sm{padding:5px 11px;font-size:.78rem}
.btn:disabled{opacity:.5;cursor:not-allowed}
/* TABLES */
.tw{overflow-x:auto}
table{width:100%;border-collapse:collapse}
thead{background:linear-gradient(135deg,var(--navy) 0%,var(--blue2) 100%)}
th{padding:11px 14px;text-align:left;font-size:.7rem;letter-spacing:.9px;text-transform:uppercase;
  color:rgba(255,255,255,.88);font-weight:700;font-family:'Montserrat',sans-serif}
td{padding:12px 14px;border-bottom:1px solid #eef1fb;font-size:.84rem;vertical-align:middle}
tr:last-child td{border-bottom:none}
tr:hover td{background:#f7f9ff}
.pending-row td{background:#fffdf0}
.rejected-row td{background:#fff5f5}
/* BADGES */
.badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:20px;
  font-size:.7rem;font-weight:700;font-family:'Montserrat',sans-serif;letter-spacing:.2px}
.bg-green{background:var(--green-lt);color:var(--green)}
.bg-red{background:var(--red-lt);color:var(--red)}
.bg-amber{background:var(--amber-lt);color:var(--amber)}
.bg-blue{background:var(--blue-lt);color:var(--blue)}
.bg-gray{background:#f3f4f6;color:var(--muted)}
.bg-navy{background:#e0e8ff;color:var(--navy)}
.bg-orange{background:var(--orange-lt);color:var(--orange)}
/* FORMS */
.fr{display:grid;grid-template-columns:repeat(auto-fit,minmax(195px,1fr));gap:15px;margin-bottom:15px}
.fg{display:flex;flex-direction:column;gap:5px}
.fg label{font-size:.72rem;font-weight:700;color:var(--navy);font-family:'Montserrat',sans-serif;
  text-transform:uppercase;letter-spacing:.4px}
.fg input,.fg select,.fg textarea{padding:10px 13px;border:1.5px solid var(--border);border-radius:7px;
  font-family:'Open Sans',sans-serif;font-size:16px;color:var(--ink);background:#fff;transition:all .18s;outline:none;-webkit-appearance:none}
.fg input:focus,.fg select:focus,.fg textarea:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,60,143,.1)}
.fg textarea{resize:vertical;min-height:78px}
.fu{border:2px dashed var(--border);border-radius:8px;padding:18px;text-align:center;cursor:pointer;transition:all .2s;background:var(--blue-xlt)}
.fu:hover{border-color:var(--blue);background:var(--blue-lt)}
.fu input{display:none}
.fu-name{font-size:.78rem;color:var(--green);margin-top:6px;font-weight:700}
/* MODAL */
.mo{position:fixed;inset:0;background:rgba(10,22,64,.62);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;padding:0;animation:fi .18s}
@media(min-width:601px){.mo{align-items:center;padding:20px}}
@keyframes fi{from{opacity:0}to{opacity:1}}
.md{background:#fff;border-radius:14px 14px 0 0;width:100%;max-width:100%;max-height:95vh;overflow-y:auto;
  animation:su .22s ease;box-shadow:var(--shadow-lg)}
@media(min-width:601px){.md{max-width:580px;border-radius:14px;max-height:92vh}}
.md-lg{max-width:100%}
@media(min-width:601px){.md-lg{max-width:720px}}
@keyframes su{from{transform:translateY(18px);opacity:0}to{transform:translateY(0);opacity:1}}
.mh{padding:18px 24px 15px;border-bottom:1px solid var(--border);display:flex;align-items:center;
  justify-content:space-between;position:sticky;top:0;z-index:10;
  background:linear-gradient(135deg,var(--navy),var(--blue));border-radius:14px 14px 0 0}
.mt{font-size:.98rem;font-weight:800;font-family:'Montserrat',sans-serif;color:#fff}
.mb2{padding:20px 24px}.mf{padding:13px 24px 20px;display:flex;gap:10px;justify-content:flex-end;border-top:1px solid var(--border)}
.xb{background:rgba(255,255,255,.18);border:none;font-size:.95rem;cursor:pointer;color:#fff;
  padding:5px 8px;border-radius:6px;transition:background .15s}
.xb:hover{background:rgba(255,255,255,.32)}
/* CONFIRM */
.co{position:fixed;inset:0;background:rgba(10,22,64,.72);z-index:300;
  display:flex;align-items:center;justify-content:center;animation:fi .15s;padding:20px}
.cb{background:#fff;border-radius:16px;padding:34px 30px;max-width:400px;width:100%;text-align:center;
  animation:su .2s;box-shadow:var(--shadow-lg);border-top:4px solid var(--red)}
.ci{font-size:2.6rem;margin-bottom:12px}
.ct{font-size:1.08rem;font-weight:800;font-family:'Montserrat',sans-serif;margin-bottom:8px;color:var(--navy)}
.cm{color:var(--muted);font-size:.87rem;margin-bottom:22px;line-height:1.7}
.cc{display:flex;gap:12px;justify-content:center;flex-wrap:wrap}
/* LOGIN */
.lp{min-height:100vh;display:flex;flex-direction:column}
@media(min-width:768px){.lp{flex-direction:row}}
.ll{flex:1;background:linear-gradient(158deg,var(--navy) 0%,var(--blue2) 48%,var(--blue) 100%);
  padding:40px 32px;display:flex;flex-direction:column;justify-content:center;position:relative;overflow:hidden}
@media(min-width:768px){.ll{padding:56px}}
.ll::before{content:'';position:absolute;top:-120px;right:-80px;width:420px;height:420px;
  border-radius:50%;background:rgba(204,31,31,.08)}
.ll-logo-row{display:flex;align-items:center;gap:18px;margin-bottom:28px;position:relative;z-index:1}
.ll-logo{width:72px;height:72px;object-fit:contain;filter:drop-shadow(0 4px 14px rgba(0,0,0,.32));background:#fff;border-radius:10px;padding:6px}
@media(min-width:768px){.ll-logo{width:92px;height:92px}}
.ll-co-name{font-family:'Montserrat',sans-serif;font-weight:900;font-size:1rem;color:#fff;line-height:1.25;text-transform:uppercase;letter-spacing:.4px}
@media(min-width:768px){.ll-co-name{font-size:1.18rem}}
.ll-co-name em{color:#ff6b6b;font-style:normal}
.ll-co-motto{font-size:.7rem;color:rgba(255,255,255,.5);margin-top:5px;font-style:italic}
.ll-h{font-family:'Montserrat',sans-serif;font-size:1.5rem;font-weight:900;color:#fff;line-height:1.2;margin-bottom:14px;position:relative;z-index:1}
@media(min-width:768px){.ll-h{font-size:1.9rem}}
.ll-h em{color:#ff6b6b;font-style:normal}
.ll-desc{color:rgba(255,255,255,.6);max-width:360px;line-height:1.8;font-size:.88rem;position:relative;z-index:1}
.ll-feats{margin-top:28px;display:flex;flex-direction:column;gap:10px;position:relative;z-index:1}
.ll-feat{display:flex;align-items:center;gap:12px;color:rgba(255,255,255,.75);font-size:.86rem}
.ll-dot{width:7px;height:7px;background:var(--red);border-radius:50%;flex-shrink:0;box-shadow:0 0 6px rgba(204,31,31,.7)}
.lr{background:#fff;display:flex;flex-direction:column;justify-content:center;
  padding:36px 28px;border-top:4px solid var(--blue)}
@media(min-width:768px){.lr{width:460px;padding:56px 48px;border-top:none;border-left:4px solid var(--blue)}}
.lr-title{font-family:'Montserrat',sans-serif;font-size:1.45rem;font-weight:900;margin-bottom:5px;color:var(--navy)}
.lr-title em{color:var(--red);font-style:normal}
.lr-sub{color:var(--muted);font-size:.86rem;margin-bottom:30px}
.lg{margin-bottom:15px}
.lg label{display:block;font-size:.72rem;font-weight:700;color:var(--navy);margin-bottom:5px;text-transform:uppercase;letter-spacing:.4px;font-family:'Montserrat',sans-serif}
.li{width:100%;padding:11px 15px;border:2px solid var(--border);border-radius:8px;
  font-family:'Open Sans',sans-serif;font-size:16px;outline:none;transition:all .2s;color:var(--ink)}
.li:focus{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,60,143,.1)}
.lbtn{width:100%;padding:13px;background:linear-gradient(135deg,var(--blue),var(--blue3));color:#fff;
  border:none;border-radius:8px;font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:800;
  cursor:pointer;margin-top:8px;transition:all .2s;letter-spacing:.3px;box-shadow:0 4px 14px rgba(26,60,143,.3)}
.lbtn:hover{background:linear-gradient(135deg,var(--navy),var(--blue2));transform:translateY(-1px)}
.lerr{background:var(--red-lt);color:var(--red);padding:10px 13px;border-radius:8px;font-size:.84rem;margin-bottom:15px;border:1px solid #fca5a5}
.lr-footer{margin-top:24px;padding-top:20px;border-top:1px solid var(--border);text-align:center}
.lr-footer-logo{width:48px;height:48px;object-fit:contain;margin-bottom:8px;opacity:.7}
.lr-footer p{font-size:.72rem;color:var(--muted);font-family:'Montserrat',sans-serif;font-weight:600;letter-spacing:.3px}
/* MISC */
.sb2{display:flex;align-items:center;gap:9px;background:#fff;border:1.5px solid var(--border);
  border-radius:8px;padding:8px 13px;flex:1;max-width:330px}
.sb2:focus-within{border-color:var(--blue);box-shadow:0 0 0 3px rgba(26,60,143,.08)}
.sb2 input{background:none;border:none;outline:none;font-family:'Open Sans',sans-serif;font-size:16px;flex:1;color:var(--ink)}
.empty{text-align:center;padding:56px 24px;color:var(--muted)}
.empty-i{font-size:2.4rem;margin-bottom:12px}
.empty h3{font-size:.92rem;margin-bottom:5px;color:var(--navy);font-family:'Montserrat',sans-serif}
.loader{text-align:center;padding:48px;color:var(--blue);font-family:'Montserrat',sans-serif;font-size:.95rem;font-weight:700}
.alert{padding:11px 15px;border-radius:8px;font-size:.84rem;margin-bottom:15px;border:1px solid transparent}
.a-ok{background:var(--green-lt);color:var(--green);border-color:#bbf7d0}
.a-err{background:var(--red-lt);color:var(--red);border-color:#fca5a5}
.a-warn{background:var(--amber-lt);color:var(--amber);border-color:#fcd34d}
.a-info{background:var(--blue-lt);color:var(--blue);border-color:#93c5fd}
.flex{display:flex}.ic{align-items:center}.jb{justify-content:space-between}
.g2{gap:8px}.g3{gap:12px}.mt4{margin-top:16px}.mb4{margin-bottom:16px}
.tm{color:var(--muted);font-size:.8rem}.fb{font-weight:700}.ts{font-size:.78rem}
.divider{border:none;border-top:1px solid var(--border);margin:16px 0}
.gr2{display:grid;grid-template-columns:1fr 1fr;gap:16px}
.gr3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:16px}
.ib{background:var(--off);border:1px solid var(--border);border-radius:8px;padding:11px 14px}
.ib-lbl{font-size:.67rem;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);font-weight:700;font-family:'Montserrat',sans-serif}
.ib-val{font-size:.88rem;font-weight:600;color:var(--navy);margin-top:2px}
.rl{display:inline-flex;align-items:center;gap:5px;color:var(--blue);font-size:.8rem;
  text-decoration:none;padding:4px 10px;background:var(--blue-lt);border-radius:6px;font-weight:600}
.rl:hover{background:var(--blue);color:#fff}
.tb-badge{background:linear-gradient(135deg,var(--red),var(--red2));color:#fff;padding:6px 13px;
  border-radius:7px;font-size:.76rem;font-weight:800;cursor:pointer;font-family:'Montserrat',sans-serif;
  box-shadow:0 2px 8px rgba(204,31,31,.3);animation:blink 2s infinite}
@media(max-width:900px){
  .sidebar{transform:translateX(-100%)}
  .main{margin-left:0}
  .hamburger{display:block}
  .ll{display:none}
  .lr{width:100%}
  .gr2,.gr3{grid-template-columns:1fr}
  .page{padding:18px 16px}
  .topbar{padding:0 16px}
}
</style>
</head>
<body>
<div id="root"></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script>
const {useState,useEffect,useCallback,createContext,useContext,useRef}=React;

// ── API BASE: relative path works on localhost:5000 AND via Ngrok ──
// Never hardcode http://localhost:5000 here — that breaks when using Ngrok.

async function apiFetch(path,opts={}){
  const token=localStorage.getItem('crm_token');
  const isFD=opts.body instanceof FormData;
  const headers={...(token?{Authorization:'Bearer '+token}:{})};
  if(!isFD) headers['Content-Type']='application/json';
  const res=await fetch(API+path,{...opts,headers,body:isFD?opts.body:(opts.body?JSON.stringify(opts.body):undefined)});
  const data=await res.json().catch(()=>({}));
  if(!res.ok) throw new Error(data.message||'Request failed');
  return data;
}
const fmt=n=>'TZS '+Number(n||0).toLocaleString();
const fmtD=d=>d?new Date(d).toLocaleDateString('en-GB',{day:'2-digit',month:'short',year:'numeric'}):'—';
const ini=n=>(n||'').split(' ').map(w=>w[0]).join('').toUpperCase().slice(0,2);
const e=React.createElement;

const AuthCtx=createContext(null);
const useAuth=()=>useContext(AuthCtx);
function AuthProvider({children}){
  const [user,setUser]=useState(()=>{try{return JSON.parse(localStorage.getItem('crm_user'));}catch{return null;}});
  const login=async(id,pw)=>{
    const d=await apiFetch('/auth/login',{method:'POST',body:{identifier:id,password:pw}});
    localStorage.setItem('crm_token',d.token);
    localStorage.setItem('crm_user',JSON.stringify(d.user));
    setUser(d.user);
  };
  const logout=()=>{localStorage.removeItem('crm_token');localStorage.removeItem('crm_user');setUser(null);};
  return e(AuthCtx.Provider,{value:{user,login,logout}},children);
}

function useRoute(){
  const [route,setR]=useState(window.location.hash.slice(1)||'/dashboard');
  const setRoute=useCallback(r=>{window.location.hash=r;setR(r);},[]);
  useEffect(()=>{const h=()=>setR(window.location.hash.slice(1)||'/dashboard');window.addEventListener('hashchange',h);return()=>window.removeEventListener('hashchange',h);},[]);

function Plots(){
  const {user}=useAuth();

  const [modal,setM]=useState(null);
  const [form,setF]=useState({
    installment_duration:12,
    down_payment_type:'fixed',
    down_payment_value:0
  });

  const load=useCallback(()=>{
    const q=new URLSearchParams(Object.fromEntries(Object.entries(flt).filter(([,v])=>v)));
    apiFetch('/plots?'+q).then(setI);
  },[flt]);
  useEffect(()=>{load();},[load]);
  useEffect(()=>{apiFetch('/projects').then(setP);},[]);

  // ── live calculator ──────────────────────────────────────────
  const instPrice = parseFloat(form.installment_price)||0;
  const dpType    = form.down_payment_type||'fixed';

  const duration  = parseInt(form.installment_duration)||1;

  const dpAmount  = dpType==='percent'
    ? Math.round((dpVal/100)*instPrice*100)/100
    : dpVal;
  const remaining = Math.max(0, instPrice - dpAmount);
  const monthly   = duration>0 ? Math.round((remaining/duration)*100)/100 : 0;

  // total months shown to user = duration installments + 1 down payment month
  const totalMonths = dpAmount>0 ? duration+1 : duration;

function Sales(){
  const {user}=useAuth();
  const [items,setI]=useState([]);
  const [clients,setC]=useState([]);
  const [projs,setP]=useState([]);
  const [ap,setAP]=useState([]);
  const [modal,setM]=useState(null);
  const [form,setF]=useState({payment_type:'cash',sale_date:new Date().toISOString().slice(0,10)});
  const [sel,setSel]=useState(null);
  const [actForm,setAF]=useState({});
  const [msg,setMsg]=useState('');
  const [avPlots,setAVP]=useState([]);

  const load=()=>{apiFetch('/sales').then(setI);};
  useEffect(()=>{load();apiFetch('/clients').then(setC);apiFetch('/projects').then(setP);},[]);
  const lp=pid=>apiFetch('/plots?project_id='+pid+'&status=available').then(setAP);
  const loadAvailPlots=()=>apiFetch('/plots?status=available').then(setAVP);

  const save=async()=>{
    try{await apiFetch('/sales',{method:'POST',body:form});setM(null);load();}
    catch(ex){alert(ex.message);}
  };

  const doCancel=async()=>{
    if(!actForm.reason||actForm.reason.trim().length<5){alert('Please enter a cancellation reason (min 5 chars)');return;}
    try{
      const r=await apiFetch('/sales/'+sel.id+'/cancel',{method:'POST',body:{reason:actForm.reason}});
      setMsg(r.message);setM(null);setSel(null);load();
    }catch(ex){alert(ex.message);}
  };

  const doRelease=async()=>{
    try{
      const r=await apiFetch('/sales/'+sel.id+'/release',{method:'POST',body:{reason:actForm.reason||''}});
      setMsg(r.message);setM(null);setSel(null);load();
    }catch(ex){alert(ex.message);}
  };

  const doTransfer=async()=>{
    if(!actForm.to_plot_id){alert('Please select a destination plot');return;}
    try{
      const r=await apiFetch('/sales/'+sel.id+'/transfer',{method:'POST',body:{
        to_plot_id:actForm.to_plot_id,

    setSel(s);

        e('tbody',null,...items.map(s=>e('tr',{key:s.id,className:statusRow[s.sale_status]||''},
          e('td',{style:{fontWeight:700,color:'var(--blue)'}},s.invoice_number||'—'),

          e('td',null,e('span',{style:{fontWeight:600}},s.plot_number)),

/* ═══ PAYMENTS ═══ */
function Payments(){
  const {user}=useAuth();
  const [items,setI]=useState([]);const [invs,setInvs]=useState([]);const [clients,setC]=useState([]);
  const [modal,setM]=useState(null);
  const [form,setF]=useState({payment_date:new Date().toISOString().slice(0,10),method:'cash'});
  const [rf,setRF]=useState(null);const [flt,setFlt]=useState('');const [sel,setSel]=useState(null);
  const [rr,setRR]=useState('');const [ar,setAR]=useState(null);const [msg,setMsg]=useState('');const [ca,setCA]=useState(null);
  const load=()=>apiFetch('/payments'+(flt?'?status='+flt:'')).then(setI).catch(()=>{});
  useEffect(()=>{load();apiFetch('/invoices').then(setInvs);apiFetch('/clients').then(setC);},[]);
  useEffect(()=>{load();},[flt]);
  const save=async()=>{
    try{
      const fd=new FormData();
      fd.append('invoice_id',form.invoice_id);fd.append('client_id',form.client_id||'');
      fd.append('amount',form.amount);fd.append('payment_date',form.payment_date);
      fd.append('receipt_number',form.receipt_number||'');fd.append('method',form.method);
      fd.append('notes',form.notes||'');if(rf)fd.append('receipt_file',rf);
      await apiFetch('/payments',{method:'POST',body:fd});
      setMsg('Payment submitted — awaiting admin approval');setM(null);load();
    }catch(ex){alert(ex.message);}
  };
  const approve=async()=>{
    try{
      const fd=new FormData();if(ar)fd.append('receipt_file',ar);
      await apiFetch('/payments/'+sel.id+'/approve',{method:'PUT',body:fd});
      setMsg('Payment approved!');setM(null);setSel(null);load();
    }catch(ex){alert(ex.message);}
  };
  const reject=async()=>{
    try{
      await apiFetch('/payments/'+sel.id+'/reject',{method:'PUT',body:{reason:rr}});
      setMsg('Payment rejected');setM(null);setSel(null);setRR('');load();
    }catch(ex){alert(ex.message);}

  const od=async p=>{const x=await apiFetch('/payments/'+p.id);setSel(x);setAR(null);setRR('');setM('d');};

            e('button',{className:'btn btn-outline btn-sm',style:{color:'var(--amber)'},onClick:()=>{setRF({id:u.id,name:u.full_name,new_password:''});setM('rp');}},'🔑 Reset PW')
          ))
        )))

    modal==='e'&&e(Modal,{title:form.id?'Edit User':'New User',onClose:()=>setM(null),

/* ═══ TITLE DEEDS ═══ */
function TitleDeeds(){
  const {user}=useAuth();
  const [items,setI]=useState([]);
  const [stage,setStage]=useState('');
  const [modal,setM]=useState(null);  // 'view' | 'edit' | 'new'
  const [sel,setSel]=useState(null);  // selected deed row
  const [form,setF]=useState({});
  const [sales,setSales]=useState([]);  // paid sales without deeds for "new"
  const [msg,setMsg]=useState('');
  const [loading,setLd]=useState(false);

  const load=useCallback(()=>{
    setLd(true);
    apiFetch('/title-deeds'+(stage?'?stage='+stage:''))
      .then(setI).catch(console.error).finally(()=>setLd(false));
  },[stage]);
  useEffect(()=>{load();},[load]);

  // load paid sales that have no deed yet (for "New Deed" modal)
  const loadEligibleSales=async()=>{
    try{
      const allSales=await apiFetch('/sales');
      const deedSaleIds=new Set(items.map(d=>d.sale_id));
      // filter: paid invoices, no deed yet
      const eligible=allSales.filter(s=>
        s.payment_status==='paid' && !deedSaleIds.has(s.id));
      setSales(eligible);
    }catch(ex){console.error(ex);}
  };

  const openNew=()=>{
    setF({});loadEligibleSales();setM('new');
  };

  const openEdit=d=>{
    setSel(d);
    setF({
      payment_completed_date:      d.payment_completed_date?.slice(0,10)||'',
      application_submitted_date:  d.application_submitted_date?.slice(0,10)||'',
      govt_fee_paid_date:          d.govt_fee_paid_date?.slice(0,10)||'',
      deed_issued_date:            d.deed_issued_date?.slice(0,10)||'',
      deed_collected_date:         d.deed_collected_date?.slice(0,10)||'',
      deed_reference_number:       d.deed_reference_number||'',
      notes:                       d.notes||''
    });
    setM('edit');
  };

  const openView=d=>{setSel(d);setM('view');};

  const saveNew=async()=>{
    if(!form.sale_id){alert('Please select a sale');return;}
    try{
      await apiFetch('/title-deeds',{method:'POST',body:{
        sale_id:form.sale_id,
        payment_completed_date:      form.payment_completed_date||null,
        application_submitted_date:  form.application_submitted_date||null,
        govt_fee_paid_date:          form.govt_fee_paid_date||null,
        deed_issued_date:            form.deed_issued_date||null,
        deed_collected_date:         form.deed_collected_date||null,
        deed_reference_number:       form.deed_reference_number||null,
        notes:                       form.notes||null
      }});
      setMsg('Title deed record created.');setM(null);load();
    }catch(ex){alert(ex.message);}
  };

  const saveEdit=async()=>{
    try{
      await apiFetch('/title-deeds/'+sel.sale_id,{method:'PUT',body:{
        payment_completed_date:      form.payment_completed_date||null,
        application_submitted_date:  form.application_submitted_date||null,
        govt_fee_paid_date:          form.govt_fee_paid_date||null,
        deed_issued_date:            form.deed_issued_date||null,
        deed_collected_date:         form.deed_collected_date||null,
        deed_reference_number:       form.deed_reference_number||null,
        notes:                       form.notes||null
      }});
      setMsg('Title deed updated.');setM(null);setSel(null);load();
    }catch(ex){alert(ex.message);}
  };

  // derive progress stage from a deed row
  const deedStage=d=>{
    if(d.deed_collected_date) return ['green','✅ Collected'];
    if(d.deed_issued_date)    return ['blue','🏛 Issued'];
    if(d.govt_fee_paid_date)  return ['amber','💰 Fee Paid'];
    if(d.application_submitted_date) return ['amber','📤 Submitted'];
    return ['gray','⏳ Pending'];
  };

  // progress steps for visual tracker
  const steps=[
    {key:'payment_completed_date',      label:'Payment\nCompleted',   icon:'💰'},
    {key:'application_submitted_date',  label:'Application\nSubmitted',icon:'📤'},
    {key:'govt_fee_paid_date',          label:'Govt Fee\nPaid',        icon:'🏦'},
    {key:'deed_issued_date',            label:'Deed\nIssued',          icon:'🏛'},
    {key:'deed_collected_date',         label:'Deed\nCollected',       icon:'🎉'},
  ];

  const ProgressTracker=({d})=>{
    const doneCount=steps.filter(s=>d[s.key]).length;
    return e('div',{style:{margin:'16px 0'}},
      e('div',{style:{display:'flex',alignItems:'center',gap:0}},
        ...steps.map((s,i)=>{
          const done=!!d[s.key];
          const active=done&&(i===steps.length-1||!d[steps[i+1]?.key]);
          return e(React.Fragment,{key:s.key},
            e('div',{style:{
              display:'flex',flexDirection:'column',alignItems:'center',
              flex:1,minWidth:0
            }},
              e('div',{style:{
                width:40,height:40,borderRadius:'50%',
                display:'flex',alignItems:'center',justifyContent:'center',
                fontSize:'1.1rem',
                background:done?'var(--green)':active?'var(--blue)':'#e5e7eb',
                border:active?'3px solid var(--blue)':'3px solid transparent',
                boxShadow:done?'0 2px 8px rgba(21,128,61,.3)':'none',
                transition:'all .25s'
              }},done?'✓':s.icon),
              e('div',{style:{
                fontSize:'.65rem',textAlign:'center',marginTop:4,
                fontWeight:done?700:400,
                color:done?'var(--green)':'var(--muted)',
                lineHeight:1.3,
                whiteSpace:'pre-line'
              }},s.label),
              d[s.key]&&e('div',{style:{
                fontSize:'.6rem',color:'var(--muted)',marginTop:2,textAlign:'center'
              }},fmtD(d[s.key]))
            ),
            i<steps.length-1&&e('div',{style:{
              height:3,flex:1,
              background:d[steps[i+1]?.key]?'var(--green)':'#e5e7eb',
              marginTop:-20,transition:'background .25s'
            }})
          );
        })
      ),
      e('div',{style:{
        textAlign:'right',marginTop:8,fontSize:'.75rem',
        color:'var(--muted)',fontWeight:600
      }},doneCount+' of '+steps.length+' stages complete')
    );
  };

  const dateField=(label,key,icon,helpText)=>e('div',{style:{
    background:'#fff',border:'1.5px solid var(--border)',borderRadius:10,
    padding:'12px 14px',display:'flex',flexDirection:'column',gap:6
  }},
    e('div',{style:{display:'flex',alignItems:'center',gap:6}},
      e('span',{style:{fontSize:'1rem'}},icon),
      e('label',{style:{
        fontSize:'.72rem',fontWeight:700,color:'var(--navy)',
        fontFamily:'Montserrat',textTransform:'uppercase',letterSpacing:'.4px'
      }},label)
    ),
    e('input',{
      type:'date',
      value:form[key]||'',
      onChange:ev=>setF(f=>({...f,[key]:ev.target.value})),
      style:{
        border:'1.5px solid var(--border)',borderRadius:7,
        padding:'8px 10px',fontSize:'16px',width:'100%',outline:'none'
      }
    }),
    helpText&&e('div',{style:{fontSize:'.68rem',color:'var(--muted)',lineHeight:1.4}},helpText)
  );

  const viewRow=(label,value,icon)=>e('div',{style:{
    display:'flex',gap:12,alignItems:'flex-start',
    padding:'10px 0',borderBottom:'1px solid var(--border)'
  }},
    e('div',{style:{fontSize:'1.1rem',width:28,flexShrink:0,textAlign:'center'}},icon),
    e('div',{style:{flex:1}},
      e('div',{style:{fontSize:'.68rem',fontWeight:700,color:'var(--muted)',
        textTransform:'uppercase',letterSpacing:'.5px',fontFamily:'Montserrat'}},label),
      e('div',{style:{fontWeight:600,color:value?'var(--navy)':'var(--muted)',marginTop:2}},
        value||'Not yet recorded')
    )
  );

  return e('div',null,
    e('div',{className:'ph'},
      e('div',null,e('h1',null,'Title Deeds'),e('div',{className:'ph-bar'})),
      e('div',{className:'flex g2',style:{flexWrap:'wrap'}},
        e('select',{className:'btn btn-outline',value:stage,onChange:ev=>setStage(ev.target.value)},
          e('option',{value:''},'All Stages'),
          e('option',{value:'pending'},'⏳ Pending'),
          e('option',{value:'in_progress'},'🔄 In Progress'),
          e('option',{value:'completed'},'🏛 Issued (Uncollected)'),
          e('option',{value:'collected'},'✅ Collected')
        ),
        user?.role==='admin'&&e('button',{className:'btn btn-blue',onClick:openNew},
          '+ New Title Deed Record')
      )
    ),

    msg&&e('div',{className:'alert a-ok'},msg,
      e('button',{style:{float:'right',background:'none',border:'none',cursor:'pointer'},
        onClick:()=>setMsg('')},'✕')),

    loading&&e(Loader),

    !loading&&e('div',{className:'card'},e('div',{className:'tw'},
      e('table',null,
        e('thead',null,e('tr',null,
          e('th',null,'Client'),e('th',null,'Plot'),e('th',null,'Project'),
          e('th',null,'Invoice'),e('th',null,'Payment Status'),
          e('th',null,'Deed Stage'),e('th',null,'Ref #'),e('th',null,'Last Updated'),
          e('th',null,'Actions')
        )),
        e('tbody',null,...items.map(d=>{
          const [stColor,stLabel]=deedStage(d);
          return e('tr',{key:d.id},
            e('td',null,e('div',{style:{fontWeight:600}},d.client_name),e('div',{className:'tm'},d.phone)),
            e('td',null,e('span',{style:{fontWeight:700,color:'var(--blue)'}},d.plot_number)),
            e('td',null,d.project_name),
            e('td',{style:{fontWeight:600,color:'var(--blue)'}},d.invoice_number),
            e('td',null,e(SB,{status:d.payment_status})),
            e('td',null,e(Badge,{type:stColor},stLabel)),
            e('td',null,d.deed_reference_number
              ?e('span',{style:{fontWeight:600,color:'var(--navy)',fontSize:'.82rem'}},d.deed_reference_number)
              :e('span',{style:{color:'var(--muted)',fontSize:'.78rem'}},'—')
            ),
            e('td',{className:'tm'},fmtD(d.updated_at)),
            e('td',null,e('div',{className:'flex g2'},
              e('button',{className:'btn btn-outline btn-sm',onClick:()=>openView(d)},'View'),
              user?.role==='admin'&&e('button',{className:'btn btn-blue btn-sm',onClick:()=>openEdit(d)},'Edit Dates')

          );
        }))

      !items.length&&!loading&&e(Empty,{
        icon:'📜',
        title:'No title deed records',
        sub:stage?'No records match this stage filter.':'Create a record when a client completes full payment.'
      })

    /* ── VIEW DEED MODAL ── */
    modal==='view'&&sel&&e(Modal,{
      title:'Title Deed — '+sel.plot_number+' · '+sel.client_name,
      onClose:()=>{setM(null);setSel(null);},large:true,
      footer:e('div',{className:'flex',style:{width:'100%',justifyContent:'space-between',alignItems:'center'}},
        user?.role==='admin'&&e('button',{className:'btn btn-blue',onClick:()=>openEdit(sel)},'✏️ Edit Dates'),
        e('button',{className:'btn btn-outline',onClick:()=>{setM(null);setSel(null);}},'Close')

      e('div',{className:'gr2',style:{marginBottom:12}},
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Client'),e('div',{className:'ib-val'},sel.client_name)),
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Plot'),e('div',{className:'ib-val'},sel.plot_number)),
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Project'),e('div',{className:'ib-val'},sel.project_name)),
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Invoice'),e('div',{className:'ib-val'},sel.invoice_number)),
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Payment Status'),e('div',{className:'ib-val'},e(SB,{status:sel.payment_status}))),
        e('div',{className:'ib'},e('div',{className:'ib-lbl'},'Deed Reference #'),e('div',{className:'ib-val'},sel.deed_reference_number||'—'))
      ),
      e('div',{style:{fontFamily:'Montserrat',fontWeight:700,fontSize:'.78rem',
        textTransform:'uppercase',letterSpacing:'.5px',color:'var(--navy)',margin:'14px 0 10px'}},
        '📊 Progress Tracker'),
      e(ProgressTracker,{d:sel}),
      e('div',{style:{fontFamily:'Montserrat',fontWeight:700,fontSize:'.78rem',
        textTransform:'uppercase',letterSpacing:'.5px',color:'var(--navy)',margin:'14px 0 10px'}},

      viewRow('Date Application Submitted',   fmtD(sel.application_submitted_date), '📤'),
      viewRow('Date Government Fee Paid',     fmtD(sel.govt_fee_paid_date),         '🏦'),
      viewRow('Date Deed Issued',             fmtD(sel.deed_issued_date),           '🏛'),
      viewRow('Date Deed Collected by Client',fmtD(sel.deed_collected_date),        '🎉'),
      sel.notes&&e('div',{style:{marginTop:14}},
        e('div',{className:'ib-lbl',style:{marginBottom:4}},'Notes'),
        e('div',{style:{fontSize:'.87rem',color:'var(--ink)',lineHeight:1.7}},sel.notes))
    ),

    /* ── NEW DEED MODAL ── */
    modal==='new'&&e(Modal,{
      title:'New Title Deed Record',
      onClose:()=>setM(null),large:true,
      footer:e(React.Fragment,null,
        e('button',{className:'btn btn-outline',onClick:()=>setM(null)},'Cancel'),
        e('button',{className:'btn btn-blue',onClick:saveNew},'Create Record')
      )},
      e('div',{className:'alert a-info',style:{marginBottom:14}},
        '📜 Create a title deed tracking record for a fully paid sale. You can fill in dates as the process progresses.'),
      e('div',{className:'fg',style:{marginBottom:14}},
        e('label',null,'Select Sale (fully paid) *'),
        e('select',{
          value:form.sale_id||'',
          onChange:ev=>setF(f=>({...f,sale_id:ev.target.value})),
          style:{padding:'10px 13px',border:'1.5px solid var(--border)',borderRadius:7,fontSize:'16px',width:'100%',outline:'none'}},
          e('option',{value:''},'Select a fully paid sale…'),
          ...sales.map(s=>e('option',{key:s.id,value:s.id},
            s.invoice_number+' — '+s.client_name+' | Plot '+s.plot_number+' ('+s.project_name+')'))
        ),
        !sales.length&&e('div',{style:{fontSize:'.78rem',color:'var(--muted)',marginTop:6}},
          'No eligible sales found. Only fully paid sales without existing deed records are shown.')
      ),
      e('div',{style:{
        display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))',gap:12,marginBottom:12}},
        dateField('Payment Completed',     'payment_completed_date',     '💰','Date all installments were fully paid'),
        dateField('Application Submitted', 'application_submitted_date', '📤','Date deed application submitted to land authority'),
        dateField('Govt Fee Paid',         'govt_fee_paid_date',         '🏦','Date government processing / stamp duty fee paid'),
        dateField('Deed Issued',           'deed_issued_date',           '🏛','Date title deed was officially issued'),
        dateField('Deed Collected',        'deed_collected_date',        '🎉','Date client physically collected the deed')
      ),
      e('div',{className:'fr'},
        e('div',{className:'fg'},
          e('label',null,'Deed Reference Number'),
          e('input',{value:form.deed_reference_number||'',
            onChange:ev=>setF(f=>({...f,deed_reference_number:ev.target.value})),
            placeholder:'Official deed / title number from government'})
        )
      ),
      e('div',{className:'fg'},
        e('label',null,'Notes'),
        e('textarea',{value:form.notes||'',onChange:ev=>setF(f=>({...f,notes:ev.target.value})),
          placeholder:'Any additional notes about this deed…',rows:3})
      )
    ),

    /* ── EDIT DEED MODAL ── */
    modal==='edit'&&sel&&e(Modal,{
      title:'Edit Deed Dates — '+sel.plot_number+' · '+sel.client_name,
      onClose:()=>{setM(null);setSel(null);},large:true,
      footer:e(React.Fragment,null,
        e('button',{className:'btn btn-outline',onClick:()=>{setM(null);setSel(null);}},'Cancel'),
        e('button',{className:'btn btn-blue',onClick:saveEdit},'💾 Save Changes')
      )},
      e('div',{className:'alert a-info',style:{marginBottom:14}},
        '📅 Update the deed processing dates as each stage is completed. Leave blank if not yet done.'),
      e('div',{style:{
        display:'grid',gridTemplateColumns:'repeat(auto-fit,minmax(230px,1fr))',gap:12,marginBottom:12}},
        dateField('1. Payment Completed',     'payment_completed_date',     '💰','Date all installments were fully paid'),
        dateField('2. Application Submitted', 'application_submitted_date', '📤','Date deed application submitted to land authority'),
        dateField('3. Govt Fee Paid',         'govt_fee_paid_date',         '🏦','Date government processing / stamp duty fee paid'),
        dateField('4. Deed Issued',           'deed_issued_date',           '🏛','Date title deed was officially issued'),
        dateField('5. Deed Collected',        'deed_collected_date',        '🎉','Date client physically collected the deed')
      ),
      e('div',{className:'fr'},
        e('div',{className:'fg'},
          e('label',null,'Deed Reference Number'),
          e('input',{value:form.deed_reference_number||'',
            onChange:ev=>setF(f=>({...f,deed_reference_number:ev.target.value})),
            placeholder:'Official deed / title number from government'})
        )
      ),
      e('div',{className:'fg'},
        e('label',null,'Notes'),
        e('textarea',{value:form.notes||'',onChange:ev=>setF(f=>({...f,notes:ev.target.value})),
          placeholder:'Any additional notes…',rows:3})
      )
    )
  );
}


/* ═══ APP SHELL ═══ */
const PT={'/dashboard':'Dashboard','/projects':'Projects','/plots':'Plots','/clients':'Clients',
  '/sales':'Sales','/invoices':'Invoices','/payments':'Payments','/reports':'Reports',
  '/sale-history':'Sale History','/title-deeds':'Title Deeds','/users':'Users'};

function App(){
  const {user}=useAuth();
  const [route,setRoute]=useRoute();
  const [pc,setPC]=useState(0);
  const [sbOpen,setSbOpen]=useState(false);
  useEffect(()=>{
    if(user?.role==='admin'){
      const f=()=>apiFetch('/payments/pending-count').then(d=>setPC(d.count)).catch(()=>{});
      f();const t=setInterval(f,30000);return()=>clearInterval(t);
    }
  },[user]);
  if(!user) return e(LoginPage);
  const rp=()=>{
    switch(route){
      case '/dashboard': return e(Dashboard,{setRoute});
      case '/projects':  return e(Projects);
      case '/plots':     return e(Plots);
      case '/clients':   return e(Clients);
      case '/sales':     return e(Sales);
      case '/invoices':  return e(Invoices);
      case '/payments':  return e(Payments);
      case '/reports':   return e(Reports);
      case '/sale-history':   return e(SaleHistory);
      case '/title-deeds':   return e(TitleDeeds);
      case '/users':     return user.role==='admin'?e(Users):e(Dashboard,{setRoute});
      default:           return e(Dashboard,{setRoute});
    }
  };
  return e('div',{className:'layout'},
    e(Sidebar,{route,setRoute,pc,open:sbOpen,onClose:()=>setSbOpen(false)}),
    e('div',{className:'main'},
      e('header',{className:'topbar'},
        e('div',{className:'tb-left'},
          e('button',{className:'hamburger',onClick:()=>setSbOpen(o=>!o),'aria-label':'Menu'},
            e('span'),e('span'),e('span')
          ),
          e('img',{src:LOGO,className:'tb-logo',alt:'logo'}),
          e('div',null,e('div',{className:'tb-title'},PT[route]||'Tanzania Plots'),e('div',{className:'tb-sub'},'Tanzania Plots Company Limited'))
        ),
        e('div',{className:'flex ic g2'},
          user.role==='admin'&&pc>0&&e('div',{className:'tb-badge',onClick:()=>setRoute('/payments')},'🔔 '+pc+' Pending'+(pc>1?'s':'')),
          e('div',{className:'av '+(user.role==='admin'?'av-red':'av-blue'),style:{width:34,height:34}},ini(user.full_name)),
          e('div',null,
            e('div',{style:{fontSize:'.83rem',fontWeight:700,color:'var(--navy)'}},user.full_name),
            e('div',{style:{fontSize:'.68rem',color:'var(--muted)'}},user.role==='admin'?'Administrator':'Staff')
          )
        )
      ),
      e('main',{className:'page'},rp())
    )
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(e(AuthProvider,null,e(App)));
</script>
</body>
</html>
